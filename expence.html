<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="expense.css">
</head>

<body>

    <div class="app">

        <!-- Header -->
        <div class="header">
            <h1>Expense Tracker</h1>
            <p>"Track your spending, control your future."</p>
        </div>

        <!-- Balance Income Expense -->
        <div class="Balance-Income-Expense">
            <div class="metric">
                <div class="label">Balance</div>
                <div class="value" id="balance">₹0</div>
            </div>
            <div class="metric income">
                <div class="label">Income</div>
                <div class="value" id="total-income">₹0</div>
            </div>
            <div class="metric expense">
                <div class="label">Expense</div>
                <div class="value" id="total-expense">₹0</div>
            </div>
        </div>


        <!-- Form -->
        <div class="form-card">
            <h2>Add Transaction</h2>

            <label>Description</label>
            <input type="text" id="desc" placeholder="Salary, Rent..." />

            <label>Amount</label>
            <input type="number" id="amount" placeholder="0" />

            <label>Type</label>
            <select id="type">
                <option value="expense">Expense</option>
                <option value="income">Income</option>
            </select>

            <label>Category</label>
            <select id="category">
                <option value="food">Food</option>
                <option value="outing">Outing</option>
                <option value="grocery">Grocery</option>
                <option value="bills">Bills</option>
                <option value="shopping">Shopping</option>
                <option value="other">Other</option>
            </select>

            <label>Date</label>
            <input type="date" id="date" />

            <button onclick="addTransaction()">+ Add transaction</button>
            <button onclick="resetAll()" class="reset-btn">🗑 Reset All</button>
        </div>

        <!-- Transaction List -->
        <div id="list"></div>

    </div>

    <script src="./expence.js"></script>
</body>

</html>
